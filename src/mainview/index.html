                        "<button class='pri' onclick='constSave()'>保存</button>" +
                        "</div>" +
                        "</div>",
                );
            }

            // DOM から現在の入力値を _constRows に同期する
            function syncConstFromDOM() {
                const tbody = document.querySelector(
                    "#const-modal .const-table tbody",
                );
                if (!tbody || !window._constRows) return;
                const rows = tbody.querySelectorAll("tr");
                rows.forEach((tr, i) => {
                    const inputs = tr.querySelectorAll("input");
                    if (inputs.length >= 2 && window._constRows[i]) {
                        window._constRows[i].name = inputs[0].value;
                        window._constRows[i].value = inputs[1].value;
                    }
                });
            }

            function constUpdate(idx, key, val) {
                if (window._constRows) window._constRows[idx][key] = val;
            }

            function constAddRow() {
                if (!window._constRows) return;
                syncConstFromDOM(); // 現在の入力値を先に保存
                window._constRows.push({ name: "", value: "" });
                renderConstModal();
            }

            function constDelRow(idx) {
                if (!window._constRows) return;
                syncConstFromDOM(); // 現在の入力値を先に保存
                window._constRows.splice(idx, 1);
                if (window._constRows.length === 0)
                    window._constRows.push({ name: "", value: "" });
                renderConstModal();
            }

            function constSave() {
                syncConstFromDOM(); // 保存前に DOM から最新値を取得
                const valid = (window._constRows || []).filter((r) =>
                    r.name.trim(),
                );
                // 重複チェック
                const names = valid.map((r) => r.name.trim());
                const dup = names.find((n, i) => names.indexOf(n) !== i);
                if (dup) {
                    alert("定数名「" + dup + "」が重複しています");
                    return;
                }
                constants = valid.map((r) => ({
                    name: r.name.trim(),
                    value: r.value,
                }));
                closeModal();
                pushUndo();
            }

            function openColDefEditor(wid) {
                const w = widgets.find((x) => x.id == wid);

                const rows = (w.props.columns || "")
                    .split(/[;\n]/)
                    .filter((s) => s.trim())
                    .map((c) => {
                        const parts = c.trim().split(":");
                        return {
                            label: parts[0] || "",
                            width: parts[1] || "80",
                        };
                    });
                if (rows.length === 0) rows.push({ label: "", width: "80" });
                window._coldefWid = wid;
                window._coldefRows = rows;
                renderColDefModal();

                        tbody +
                        "</tbody>" +
                        "</table>" +
                        "</div>" +
                        (rows.length < 100
                            ? "<button class='add-row-btn' onclick='coldefAddRow()'>＋ 行を追加</button>"
                            : "") +
                        "</div>" +
                        "<div class='mfoot'>" +
                        "<button onclick='closeModal()'>キャンセル</button>" +
                        "<button class='pri' onclick='coldefSave()'>保存</button>" +
                        "</div>" +
                        "</div>",
                );
            }
            function coldefUpdate(idx, key, val) {
                if (window._coldefRows) window._coldefRows[idx][key] = val;
            }
            function coldefAddRow() {
                if (!window._coldefRows || window._coldefRows.length >= 100)
                    return;
                window._coldefRows.push({ label: "", width: "80" });
                renderColDefModal();
            }
            function coldefDelRow(idx) {
                if (!window._coldefRows) return;
                window._coldefRows.splice(idx, 1);
                if (window._coldefRows.length === 0)
                    window._coldefRows.push({ label: "", width: "80" });
                renderColDefModal();
            }
            function coldefSave() {
                const wid = window._coldefWid;
                const w = widgets.find((x) => x.id == wid);
                if (!w) return;
                const valid = (window._coldefRows || []).filter((r) =>
                    r.label.trim(),
                );
                if (valid.length === 0) {
                    alert("カラム名を1つ以上入力してください");
                    return;
                }
                w.props.columns = valid
                    .map(
                        (r) => r.label.trim() + ":" + (parseInt(r.width) || 80),
                    )
                    .join("\n");
                closeModal();
                pushUndo();
                renderWidget(w, false);
                applyWPos($("w" + wid), w);
                renderProps();
            }

            function toggleGrid() {
                fb().classList.toggle("show-grid");
            }
            function toggleSnap() {
                snapOn = !snapOn;
            }
            function updateCount() {
                $("st-cnt").innerHTML =
                    `ウィジェット: <b>${widgets.length}</b>`;
            }

            function toggleMenu(id, e) {
                e.stopPropagation();
                const already = $(id).classList.contains("open");
                closeAllMenus();
                if (!already) $(id).classList.add("open");
            }
            function closeAllMenus() {
                document
                    .querySelectorAll(".dropdown")
                    .forEach((d) => d.classList.remove("open"));
            }

            /* ═══════════════════════════════════════════
              KEYBOARD
            ═══════════════════════════════════════════ */
            document.addEventListener("keydown", (e) => {
                const tag = e.target.tagName;
                if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT")
                    return;
                if (e.ctrlKey && e.key === "z") {
                    e.preventDefault();
                    actUndo();
                }
                if (e.ctrlKey && e.key === "y") {
                    e.preventDefault();
                    actRedo();
                }
                if (e.ctrlKey && e.key === "s") {
                    e.preventDefault();
                    actSave();
                }
                if (e.ctrlKey && e.key === "w") {
                    e.preventDefault();
                    showCloseConfirm();
                }
                if (e.key === "F4" && e.altKey) {
                    e.preventDefault();
                    showCloseConfirm();
                }
                if (e.ctrlKey && e.key === "n") {
                    e.preventDefault();
                    actNew();
                }
                if (e.ctrlKey && e.key === "d") {
                    e.preventDefault();
                    actDuplicate();
                }
                if ((e.key === "Delete" || e.key === "Backspace") && selId) {
                    e.preventDefault();
                    actDelete();
                }
                if (e.key === "Escape") {
                    if (
                        document
                            .getElementById("close-confirm")
                            .classList.contains("show")
                    ) {
                        hideCloseConfirm();
                        return;
                    }
                    selId ? deselect() : setTool("pointer");
                }
                if (
                    selId &&
                    [
                        "ArrowLeft",
                        "ArrowRight",
                        "ArrowUp",
                        "ArrowDown",
                    ].includes(e.key)
                ) {
                    e.preventDefault();
                    const w = widgets.find((x) => x.id === selId);
                    if (!w) return;
                    const d = e.shiftKey ? SNAP : 1;
                    if (e.key === "ArrowLeft") w.x = Math.max(0, w.x - d);
                    if (e.key === "ArrowRight")
                        w.x = Math.min(formCfg.w - w.w, w.x + d);
                    if (e.key === "ArrowUp") w.y = Math.max(0, w.y - d);
                    if (e.key === "ArrowDown")
                        w.y = Math.min(formCfg.h - w.h, w.y + d);
                    const el = $("w" + w.id);
                    if (el) {
                        el.style.left = w.x + "px";
                        el.style.top = w.y + "px";
                    }
                    updateStatusSel(w);
                    syncPropXY(w);
                }
            });

            document.addEventListener("mousedown", (e) => {
                if (!e.target.closest(".menu-item")) closeAllMenus();
                if (!e.target.closest("#ctx") && !e.target.closest(".widget"))
                    hideCtx();
                if (!e.target.closest("#fdd-wrap")) closeFdd();
            });

            /* ═══════════════════════════════════════════
              RULER（座標ルーラー）
            ═══════════════════════════════════════════ */
            function initRuler() {
                drawRulers();
            }

            function drawRulers() {
                const wrap = $("canvas-wrap");
                const wrapRect = wrap.getBoundingClientRect();
                const formRect = fb().getBoundingClientRect();

                // ── 水平ルーラー ──
                const rh = $("ruler-h");
                const hCanvas = $("ruler-h-canvas");
                const hW = wrapRect.width;
                rh.style.width = hW + "px";
                hCanvas.width = hW;
                hCanvas.height = 16;
                const hCtx = hCanvas.getContext("2d");
                hCtx.clearRect(0, 0, hW, 16);

                // フォーム左端のラッパー内相対座標
                const fLeft = formRect.left - wrapRect.left + 16; // ruler-v幅分オフセット
                drawRulerH(hCtx, hW, fLeft);

                // ── 垂直ルーラー ──
                const rv = $("ruler-v");
                const vCanvas = $("ruler-v-canvas");
                const vH = wrapRect.height - 16;
                rv.style.height = vH + "px";
                vCanvas.width = 16;
                vCanvas.height = vH;
                const vCtx = vCanvas.getContext("2d");
                vCtx.clearRect(0, 0, 16, vH);

                const fTop = formRect.top - wrapRect.top; // ruler-h高さ分は既に top:16px で吸収
                drawRulerV(vCtx, vH, fTop);
            }

            function drawRulerH(ctx, totalW, fLeft) {
                const STEP = 50,
                    TICK_LG = 8,
                    TICK_SM = 4;
                ctx.strokeStyle = "rgba(160,160,192,0.35)";
                ctx.fillStyle = "rgba(160,160,192,0.55)";
                ctx.font = "8px monospace";
                ctx.textAlign = "left";
                // フォーム原点から左右に目盛りを描く
                for (let px = (fLeft % STEP) - STEP; px < totalW; px += STEP) {
                    const coord = Math.round(px - fLeft); // フォーム座標
                    // 大目盛り
                    ctx.beginPath();
                    ctx.moveTo(px, 16 - TICK_LG);
                    ctx.lineTo(px, 16);
                    ctx.stroke();
                    if (px >= 0 && px < totalW && coord >= 0) {
                        ctx.fillText(coord, px + 2, 9);
                    }
                    // 中目盛り（25px）
                    const px2 = px + STEP / 2;
                    if (px2 >= 0 && px2 < totalW) {
                        ctx.beginPath();
                        ctx.moveTo(px2, 16 - TICK_SM);
                        ctx.lineTo(px2, 16);
                        ctx.stroke();
                    }
                }
                // フォーム範囲ハイライト
                const fw = formCfg.w;
                ctx.fillStyle = "rgba(122,158,248,0.10)";
                ctx.fillRect(fLeft, 0, fw, 16);
                // フォーム境界線
                ctx.strokeStyle = "rgba(122,158,248,0.4)";
                ctx.beginPath();
                ctx.moveTo(fLeft, 0);
                ctx.lineTo(fLeft, 16);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(fLeft + fw, 0);
                ctx.lineTo(fLeft + fw, 16);
                ctx.stroke();
            }

            function drawRulerV(ctx, totalH, fTop) {
                const STEP = 50,
                    TICK_LG = 8,
                    TICK_SM = 4;
                ctx.strokeStyle = "rgba(160,160,192,0.35)";
                ctx.fillStyle = "rgba(160,160,192,0.55)";
                ctx.font = "8px monospace";
                ctx.save();
                ctx.translate(14, 0);
                ctx.rotate(Math.PI / 2); // 縦書きラベル用
                for (let py = (fTop % STEP) - STEP; py < totalH; py += STEP) {
                    const coord = Math.round(py - fTop);
                    ctx.save();
                    ctx.setTransform(1, 0, 0, 1, 0, 0);
                    // 大目盛り
                    ctx.strokeStyle = "rgba(160,160,192,0.35)";
                    ctx.beginPath();
                    ctx.moveTo(16 - TICK_LG, py);
                    ctx.lineTo(16, py);
                    ctx.stroke();
                    if (py >= 0 && py < totalH && coord >= 0) {
                        ctx.fillStyle = "rgba(160,160,192,0.55)";
                        ctx.font = "8px monospace";
                        ctx.save();
                        ctx.translate(12, py - 2);
                        ctx.rotate(-Math.PI / 2);
                        ctx.fillText(coord, -28, 0);
                        ctx.restore();
                    }
                    // 中目盛り
                    const py2 = py + STEP / 2;
                    if (py2 >= 0 && py2 < totalH) {
                        ctx.strokeStyle = "rgba(160,160,192,0.35)";
                        ctx.beginPath();
                        ctx.moveTo(16 - TICK_SM, py2);
                        ctx.lineTo(16, py2);
                        ctx.stroke();
                    }
                    ctx.restore();
                }
                ctx.restore();
                // フォーム範囲ハイライト
                const fh = formCfg.h;
                ctx.fillStyle = "rgba(122,158,248,0.10)";
                ctx.fillRect(0, fTop, 16, fh);
                ctx.strokeStyle = "rgba(122,158,248,0.4)";
                ctx.beginPath();
                ctx.moveTo(0, fTop);
                ctx.lineTo(16, fTop);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, fTop + fh);
                ctx.lineTo(16, fTop + fh);
                ctx.stroke();
            }

            /* ═══════════════════════════════════════════
              FORM RESIZE（フォーム枠のD&D）
            ═══════════════════════════════════════════ */
            function initFormResize() {
                function makeResizer(elId, doX, doY) {
                    const el = $(elId);
                    if (!el) return;
                    el.addEventListener("mousedown", (e) => {
                        if (e.button !== 0) return;
                        e.preventDefault();
                        e.stopPropagation();
                        const sx = e.clientX,
                            sy = e.clientY;
                        const ow = formCfg.w,
                            oh = formCfg.h;
                        function onMove(ev) {
                            if (doX) {
                                const nw = Math.max(
                                    200,
                                    sn(ow + (ev.clientX - sx)),
                                );
                                formCfg.w = nw;
                            }
                            if (doY) {
                                const nh = Math.max(
                                    100,
                                    sn(oh + (ev.clientY - sy)),
                                );
                                formCfg.h = nh;
                            }
                            applyForm();
                            syncFormPropWH();
                        }
                        function onUp() {
                            document.removeEventListener("mousemove", onMove);
                            document.removeEventListener("mouseup", onUp);
                            pushUndo();
                        }
                        document.addEventListener("mousemove", onMove);
                        document.addEventListener("mouseup", onUp);
                    });
                }
                makeResizer("form-resize-br", true, true);
                makeResizer("form-resize-r", true, false);
                makeResizer("form-resize-b", false, true);
            }
            function syncFormPropWH() {
                if (selId) return; // フォームのプロパティ表示中のみ
                const rows = [...$("plist").querySelectorAll(".prow")];
                rows.forEach((r) => {
                    const inp = r.querySelector("input[type=number]");
                    const lbl = r.querySelector(".pk")?.textContent;
                    if (!inp || !lbl) return;
                    if (lbl === "Width") inp.value = formCfg.w;
                    if (lbl === "Height") inp.value = formCfg.h;
                });
            }

            /* ═══════════════════════════════════════════
              INIT
            ═══════════════════════════════════════════ */
            buildTools();
            buildFormSelect();
            applyForm();
            initFormBodyEvents();
            initFormResize();
            initRuler();
            $("canvas-wrap").addEventListener("scroll", () =>
                requestAnimationFrame(drawRulers),
            );
            window.addEventListener("resize", () =>
                requestAnimationFrame(drawRulers),
            );
            pushUndo();
            renderProps();
        </script>

        <!-- Electrobun RPC ブリッジ（Electrobun が bridge.ts をバンドルして読み込む） -->
        <script src="./bridge.ts"></script>
    </body>
</html>
